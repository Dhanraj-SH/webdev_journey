        async function sub(){
            
            const a = document.getElementById("first_no").value;
            const b = document.getElementById("second_no").value;

            const res = await fetch("http://localhost:3000/sub/" + a +"/"+ b);
            const json = await res.json();

            document.getElementById("response").innerHTML = json.ans;
        }

        async function mul(){
            
            const a = document.getElementById("first_no").value;
            const b = document.getElementById("second_no").value;

            const res = await fetch("http://localhost:3000/mul/" + a +"/"+ b);
            const json = await res.json();

            document.getElementById("response").innerHTML = json.ans;
        }

        async function div(){
            
            const a = document.getElementById("first_no").value;
            const b = document.getElementById("second_no").value;

            const res = await fetch("http://localhost:3000/div/" + a +"/"+ b);
            const json = await res.json();

            document.getElementById("response").innerHTML = json.ans;

    <input type="text" placeholder="First number" id="first_no" />
    <input type="text" placeholder="Second number" id="second_no" />

    <button onclick="sub()">SUBTRACT</button>
    <button onclick="mul()">MULTIPLY</button>
    <button onclick="div()">DIVISON</button>
